<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NM Checkbox</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 800px;
      height: 700px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .title {
      text-align: center;
      color: #38bdf8;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
      gap: 10px;
      overflow-y: auto;
      padding: 5px;
    }

    .checkbox {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    input[type="checkbox"] {
      appearance: none;
      width: 30px;
      height: 30px;
      border: 2px solid #64748b;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    input[type="checkbox"]:hover {
      border-color: #38bdf8;
      transform: scale(1.1);
    }

    input[type="checkbox"]:checked {
      background: #38bdf8;
      border-color: #38bdf8;
      box-shadow: 0 0 10px #38bdf8;
    }

    /* Optional scrollbar styling */
    .grid::-webkit-scrollbar {
      width: 6px;
    }

    .grid::-webkit-scrollbar-thumb {
      background: #38bdf8;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  
  <div class="container">
    <div class="title">NM Checkbox</div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- scripts -->
   <script src="/socket.io/socket.io.js"></script>

  <script>
    const TOTAL = 1000; 
    const socket = io();

    const grid = document.getElementById("grid");

    new Array(TOTAL).fill(null).forEach((_,index)=>{
      const div = document.createElement("div");
      div.className = "checkbox";

      let input = document.createElement("input");
      input.id = `checkbox-${index}`
      input.type = "checkbox";


      input.addEventListener('change',(event)=>{
        let checked = event.target.checked
        socket.emit("client:checked",{checked,index})
        
      })
      div.appendChild(input);
      grid.appendChild(div)
    }) 

    socket.on("server:checked", (data)=>{
      document.querySelector(`#checkbox-${data.index}`).checked=data.checked
      // console.log(data)
    })
    socket.on("server:checkboxStates", (data)=>{
      console.log(data)
      data.forEach((_,index)=>{
        document.querySelector(`#checkbox-${index}`).checked=data[index]
      })
      
    })
  </script>
  


</body>
</html>
